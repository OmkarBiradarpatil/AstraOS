name: AstraOS CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  web:
    name: Web
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - name: Upgrade npm
        run: npm install -g npm@11.6.2
      - name: Install
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Test
        run: npm run test
      - name: Build
        run: npm run build
      - name: Audit
        run: npm audit --audit-level=high

  web-e2e:
    name: Web E2E
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - name: Upgrade npm
        run: npm install -g npm@11.6.2
      - name: Install
        run: npm ci
      - name: Install Chromium
        run: npx playwright install --with-deps chromium
      - name: E2E
        run: npm run test:e2e
      - name: Upload E2E artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: astraos-playwright-artifacts
          path: |
            apps/web/test-artifacts/e2e-results/
            apps/web/test-artifacts/playwright-report/
          if-no-files-found: ignore

  backend:
    name: Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - name: Upgrade npm
        run: npm install -g npm@11.6.2
      - name: Install
        run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Test
        run: npm run test
      - name: Build
        run: npm run build
      - name: Audit
        run: npm audit --audit-level=high
